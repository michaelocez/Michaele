<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Michaele</title>
	<meta name="description" content="A tiny seven-letter word game with a very Michael twist.">
	<meta name="theme-color" content="#121213">
	<link rel="stylesheet" href="style.css?v=7">
</head>
<body>
	<main class="app-shell">
		<h1 class="title">Michaele</h1>
		<p class="visually-hidden" id="announcer" aria-live="polite"></p>
		<div class="win-toast" id="win-toast" hidden aria-live="polite"></div>

		<section class="board" id="board" tabindex="0" aria-label="Guess board: six rows of seven letters"></section>
		<section class="keyboard" id="keyboard" aria-label="On-screen keyboard"></section>
		<div class="end-game-modal" id="end-game-modal" hidden>
			<div class="end-game-card" role="dialog" aria-modal="true" aria-labelledby="end-game-title">
				<h2 id="end-game-title">Game over</h2>
				<button class="secondary-button" type="button" id="restart-button">New game</button>
			</div>
		</div>
	</main>

	<script src="dictionary.js?v=2"></script>
	<script src="script.js?v=7"></script>
</body>
</html>
